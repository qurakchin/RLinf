defaults:
  - env/libero_object@env.eval
  - model/pi0_5@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: all

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_object_openpi_pi05_eval"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"

  eval:
    rollout_epoch: 1
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 280
    max_steps_per_rollout_epoch: 280
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  pipeline_stage_num: 1

  model:
    model_path: "/mnt/project_rlinf_hs/chenkang/openpi-main/checkpoints/sft/pi05_libero/few_sft/30000/" # https://huggingface.co/RLinf/RLinf-Pi05-LIBERO-SFT
    model_type: "openpi"
    num_action_chunks: 5
    # openpi specific parameters
    openpi:
      noise_level: 0.3
