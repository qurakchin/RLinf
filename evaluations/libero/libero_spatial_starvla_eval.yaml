defaults:
  - env/libero_spatial@env.eval
  - model/starvla@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: all

runner:
  task_type: embodied_eval
  weight_sync_interval: 1
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_grpo_starvla_paper_lite_8gpu_qwenoft_eval"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 60
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"
  enable_offload: False

  eval:
    rollout_epoch: 4
    total_num_envs: 120
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  sampling_params:
    do_sample: True
    # QwenFast token decode is sensitive; lower temperature improves valid FAST-code rate.
    temperature_train: 0.3
    temperature_eval: 0.3
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

    max_new_tokens: 256

  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: franka
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: /path/to/model # https://huggingface.co/StarVLA/Qwen2.5-VL-OFT-LIBERO-4in1
    action_dim: 7
    num_action_chunks: 8
    unnorm_key: franka # starVLA action-stats key for LIBERO Franka tasks.
    add_value_head: False
    action_stats_source: "minmax"
    starvla:
      framework_name: "QwenOFT"
      expected_action_dim: ${rollout.model.action_dim}
      expected_num_action_chunks: ${rollout.model.num_action_chunks}
      enable_state_input: False
