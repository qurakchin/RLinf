defaults:
  - env/robotwin_place_shoe@env.eval
  - model/lingbotvla@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout: 0-7

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_grpo_lingbotvla"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

env:
  group_name: "EnvGroup"

  # Override the default values in env/robotwin_place_shoe
  eval:
    rollout_epoch: 1
    total_num_envs: 128
    use_custom_reward: False
    use_rel_reward: True
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 400
    reward_coef: 5.0
    max_steps_per_rollout_epoch: 400
    group_size: 1
    use_fixed_reset_state_ids: True 
    is_eval: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "/path/to/lingbot_sft_model"
    tokenizer_path: "/path/to/model/Qwen2.5-VL-3B-Instruct"
    model_type: "lingbotvla"
    lingbotvla:
      config_path: "/path/to/lingbot-vla-4b"
    value_type: action_level  # 'action' or 'token'
    action_dim: 14
    use_proprio: True
    proprio_dim: 14

    num_action_chunks: 50
    is_lora: False
    max_prompt_length: 512

    num_steps: 10
    noise_method: "flow_sde"
    noise_level: 0.7
    joint_logprob: False
    action_env_dim: 14
    add_value_head: False
    safe_get_logprob: False
