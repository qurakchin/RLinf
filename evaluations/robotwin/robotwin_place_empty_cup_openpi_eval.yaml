defaults:
  - env/robotwin_place_empty_cup@env.eval
  - model/pi0@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/
    
cluster:
  num_nodes: 1
  component_placement:
    env, rollout: 0-7

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_grpo_openpi"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

env:
  group_name: "EnvGroup"

  # Override the default values in env/robotwin_place_empty_cup
  eval:
    rollout_epoch: 1
    total_num_envs: 128
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    reward_coef: 5.0
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    center_crop: False
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    task_config:
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: "/path/to/model/RLinf-Pi0-SFT"
    num_action_chunks: 50 # interface for the env
    action_dim: 14
    use_proprio: True
    add_value_head: True
    num_steps: 5
    openpi:
      config_name: "pi0_aloha_robotwin"
      num_images_in_input: 3
      train_expert_only: True
      detach_critic_input: True
