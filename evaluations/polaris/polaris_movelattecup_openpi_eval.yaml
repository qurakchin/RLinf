defaults:
  - env/polaris_droid_movelattecup@env.eval
  - model/pi0@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: 0

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "polaris_openpi_eval"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"

  eval:
    rollout_epoch: 25
    total_num_envs: 1
    max_episode_steps: 456
    max_steps_per_rollout_epoch: 456
    auto_reset: True
    ignore_terminations: True
    is_eval: True
    seed: 42
    init_params:
      open_loop_horizon: ${rollout.model.num_action_chunks}
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/RLinf-Pi0-Polaris-droid_jointpos/"
    model_type: "openpi"
    action_dim: 8
    num_action_chunks: 8
    num_steps: 10
    add_value_head: True
    openpi:
      config_name: "pi0_droid_polaris"
      num_images_in_input: 2
      noise_level: 0.5
      joint_logprob: False
      detach_critic_input: True
