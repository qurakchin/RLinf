defaults:
  - env/realworld_bin_relocation@env.eval
  - model/dreamzero_5b@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    env:
      node_group: franka
      placement: 0
    rollout:
      node_group: train
      placement: 0
  node_groups:
    - label: train
      node_ranks: 0
    - label: franka
      node_ranks: 1
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP
            node_rank: 1

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld-pnp-eval-dreamzero"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"
  enable_offload: False

  eval:
    rollout_epoch: 1
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: False
    keyboard_reward_wrapper: null
    no_gripper: False
    use_spacemouse: False
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240

    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: "/path/to/video/eval"

    override_cfg:
      task_description: null  # e.g. "pick up the object and place it into the container"
      target_ee_pose: TARGET_EE_POSE
      camera_serials: ["SERIAL1", "SERIAL2"]
      is_dummy: False
      use_dense_reward: False
      max_num_steps: ${env.eval.max_episode_steps}
      binary_gripper_threshold: 0.5
      enable_gripper_penalty: False
      enable_camera_player: True

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  enable_torch_compile: False
  enable_cuda_graph: False

  model:
    model_type: "dreamzero"
    precision: bf16
    model_path: "/path/to/model"
    tokenizer_path: "/path/to/tokenizer"
    metadata_json_path: ${rollout.model.model_path}/experiment_cfg/metadata.json

    is_lora: False
    load_to_device: True
    embodiment_tag: "franka_pnp"
    relative_action: False
    relative_action_per_horizon: False
    relative_action_keys: []

    action_horizon: 12
    num_action_chunks: 12
    num_action_per_block: 12
    target_video_height: 160
    target_video_width: 320

    action_head_cfg:
      config:
        action_loss_embodiment_ids:
          - 26
          - 21
          - 17
        model_dtype: bfloat16
