defaults:
  - behavior_ppo_openpi_pi05

hydra:
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout:
      placement: 0-1
    actor:
      placement: 0-1
    env:
      placement: 2-3

runner:
  logger:
    experiment_name: "behavior_ppo_openpi05_train"
  max_epochs: 1000
  max_steps: 1000

algorithm:
  rollout_epoch: 16
  reward_coef: 4096.0
  filter_rewards: True
  rewards_lower_bound: 1
  rewards_upper_bound: 9
  # gamma: 0.9995
  gamma: 1
  sampling_params:
    temperature_train: 0.6

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    max_episode_steps: 2048
    max_steps_per_rollout_epoch: 2048
    reward_coef: ${algorithm.reward_coef}
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
    # uncomment to use instance id
    # omni_config:
    #   task:
    #     activity_instance_dir: /path/to/BEHAVIOR-1K-datasets/2025-challenge-task-instances/scenes/house_double_floor_lower/json/house_double_floor_lower_task_turning_on_radio_instances
    #     instance_file_format: tro_state
    #     instance_resample_mode: offline
    #     online_object_sampling: False
    #     use_presampled_robot_pose: True
    num_env_subprocess: 2
  eval:
    total_num_envs: 8
    max_episode_steps: 2048
    max_steps_per_rollout_epoch: 2048
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    # skip_intermediate_obs_in_chunk: False # set to False to save full video
    # uncomment to use instance id
    # omni_config:
    #   task:
    #     activity_instance_dir: /path/to/BEHAVIOR-1K-datasets/2025-challenge-task-instances/scenes/house_double_floor_lower/json/house_double_floor_lower_task_turning_on_radio_instances
    #     instance_file_format: tro_state
    #     instance_resample_mode: offline
    #     online_object_sampling: False
    #     use_presampled_robot_pose: True

actor:
  micro_batch_size: 4
  global_batch_size: 64
  optim:
    value_lr: 1.0e-4
  model:
    openpi:
      noise_level: 0.5

rollout:
  sync_weight_load_instant: False # if True, load weight instantly, otherwise save all buckets to CPU and load weight after receiving all buckets to save gpu memory.
