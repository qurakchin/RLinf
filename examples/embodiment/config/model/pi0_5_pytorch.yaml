model_type: "openpi_pytorch"

# Model-shape template only. The real filesystem paths (model_path and the
# openpi.assets_dir / openpi.asset_id / openpi.paligemma_tokenizer below) are set
# in the eval experiment config (behavior_ppo_openpi_pi05_pytorch_eval.yaml); the
# values here are placeholders so this template stays path-free and reusable.

# Weight dtype for eval: bf16. (SFT keeps an fp32 master; see the SFT template.)
precision: bf16

# LoRA is not used for eval, but the shared model factory reads these keys.
is_lora: False
lora_rank: 32

# Action and chunk settings (BEHAVIOR pi05). `num_action_chunks` is the Pi0
# action_horizon.
num_action_chunks: 32
action_dim: 23
use_proprio: True

# Number of flow-matching denoising steps for eval action sampling. The model is
# tuned for this step count and the action-parity gate holds at equal num_steps.
num_steps: 5

# No value head in the eval-only model.
add_value_head: False

# openpi_pytorch model-shape parameters. get_model builds Pi0Config from
# num_action_chunks (action_horizon) + the openpi.* shape fields; no config.json
# is read. assets_dir/asset_id/paligemma_tokenizer are placeholders resolved in
# the eval experiment config.
openpi:
  num_images_in_input: 3
  action_chunk: ${actor.model.num_action_chunks}
  num_steps: ${actor.model.num_steps}
  action_env_dim: ${actor.model.action_dim}
  # Selects the per-env eval processor
  # (rlinf.data.datasets.openpi_pytorch.get_eval_processer).
  env: behavior
  # Pi0 model shape: padded action dim, LLM/expert variants, prompt token budget.
  model_action_dim: 32
  paligemma_variant: "gemma_2b"
  action_expert_variant: "gemma_300m"
  max_token_len: 200
  # Placeholders — set the real norm-stats + tokenizer locations in the eval
  # experiment config.
  assets_dir: "/path/to/assets"
  asset_id: "behavior-1k/2025-challenge-demos"
  paligemma_tokenizer: "/path/to/paligemma_tokenizer.model"
