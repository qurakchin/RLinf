defaults:
  - env/realworld_bin_relocation@env.train
  - env/realworld_bin_relocation@env.eval
  - model/dreamzero_5b@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "train"
      placement: 0
    env:
      node_group: "franka"
      placement: 0
    rollout:
      node_group: "train"
      placement: 0
  node_groups:
    - label: "train"
      node_ranks: 0
    - label: franka
      node_ranks: 1
      hardware:
        type: Franka
        configs:
          - robot_ip: ROBOT_IP
            node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld-pnp-eval-dreamzero"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 1
  adv_type: grpo
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  gamma: 0.99
  gae_lambda: 0.95
  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 1
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240

  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: False
    keyboard_reward_wrapper: null
    no_gripper: False
    use_spacemouse: False
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240

    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: "/path/to/video/eval"

    override_cfg:
      task_description: null  # e.g. "pick up the object and place it into the container"
      target_ee_pose: TARGET_EE_POSE
      camera_serials: ["SERIAL1", "SERIAL2"]
      is_dummy: False
      use_dense_reward: False
      max_num_steps: ${env.eval.max_episode_steps}
      binary_gripper_threshold: 0.5
      enable_gripper_penalty: False
      enable_camera_player: True

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  enable_torch_compile: False
  enable_cuda_graph: False

  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: False

  model:
    model_type: "dreamzero"
    precision: bf16
    model_path: "/path/to/model"
    tokenizer_path: "/path/to/tokenizer"
    metadata_json_path: ${actor.model.model_path}/experiment_cfg/metadata.json

    is_lora: False
    load_to_device: True
    embodiment_tag: "franka_pnp"
    relative_action: False
    relative_action_per_horizon: False
    relative_action_keys: []

    action_horizon: 12
    num_action_chunks: 12
    num_action_per_block: 12
    target_video_height: 160
    target_video_width: 320

    action_head_cfg:
      config:
        action_loss_embodiment_ids:
          - 26
          - 21
          - 17
        model_dtype: bfloat16

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

critic:
  use_critic_model: False

reward:
  use_reward_model: False
