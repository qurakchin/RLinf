defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/gr00t_n1d6@actor.model           
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_ppo_gr00t_n1d6"   
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 100

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1            
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 1
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.01
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  clip_log_ratio_min: -20
  clip_log_ratio_max: 20
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    use_rel_reward: false
    reward_coef: 5.0
    total_num_envs: 8
    group_size: 1
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    auto_reset: True
  eval:
    use_rel_reward: false
    total_num_envs: 8
    group_size: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/RLinf-Gr00t-N1.6-RL-Spatial"
    precision: ${actor.model.precision}
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  num_gpus: 1
  micro_batch_size: 2
  global_batch_size: 8
  seed: 1234
  enable_offload: True

  model:
    model_path: "/path/to/RLinf-Gr00t-N1.6-RL-Spatial"
    model_type: "gr00t_n1d6"   
    embodiment_tag: "libero_panda"
    add_value_head: True
    num_action_chunks: 16
    action_dim: 7
    denoising_steps: 4
    no_split_modules:
      - "Qwen3DecoderLayer"
      - "Siglip2EncoderLayer"
      - "FlowMatchingActionHeadForRLActionPrediction"
      - "TimestepEncoder"
      - "TimestepEmbedding"
      - "ValueHead"
      - "ExploreNoiseNet"         

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0
  
  fsdp_config:
    strategy: "fsdp"
    wrap_policy:
      transformer_layer_cls_to_wrap:
        - "Qwen3DecoderLayer"
        - "Siglip2EncoderLayer"
        - "FlowMatchingActionHeadForRLActionPrediction"
        - "TimestepEncoder"
        - "TimestepEmbedding"
        - "ValueHead"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False