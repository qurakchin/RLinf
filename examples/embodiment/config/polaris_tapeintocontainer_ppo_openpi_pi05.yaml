defaults:
  - env/polaris_droid_tapeintocontainer@env.train
  - env/polaris_droid_tapeintocontainer@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,rollout,env: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "polaris_tapeintocontainer_ppo_openpi_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 20
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1
  weight_sync_interval: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 2
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.02
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.995
  gae_lambda: 0.95

env:
  group_name: "EnvGroup"
  train:
    rollout_epoch: 5
    total_num_envs: 1
    max_episode_steps: 450
    max_steps_per_rollout_epoch: 450
    auto_reset: True
    ignore_terminations: True
    seed: 42
  eval:
    rollout_epoch: 5
    total_num_envs: 1
    max_episode_steps: 450
    max_steps_per_rollout_epoch: 450
    auto_reset: True
    ignore_terminations: True
    video_cfg:
      save_video: False
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    seed: 42

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/RLinf-Pi05-Polaris-droid_jointpos/"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 150
  seed: 42
  enable_offload: True

  model:
    model_path: "/path/to/model/RLinf-Pi05-Polaris-droid_jointpos/"
    action_dim: 8
    num_action_chunks: 15
    num_steps: 10
    add_value_head: True
    openpi:
      config_name: "pi05_droid_polaris"
      num_images_in_input: 2
      noise_level: 0.5
      joint_logprob: False
      num_steps: ${actor.model.num_steps}
      value_after_vlm: True
      detach_critic_input: True

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
