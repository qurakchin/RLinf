defaults:
  - env/robotwin_adjust_bottle@env.train
  - env/robotwin_adjust_bottle@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env: 4-7
    rollout: 4-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_adjust_bottle_dagger_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: 20
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  reward_coef: 1.0

  dagger:
    # Expert acts with probability beta, student acts with probability 1 - beta.
    init_beta: 1.0
    beta_schedule: "exponential"
    beta_decay: 0.99
    # False enables classic DAgger: student-acted data is re-labeled by expert.
    only_save_expert: False

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  replay_buffer:
    enable_cache: True
    cache_size: 2000
    min_buffer_size: 16
    sample_window_size: 2000
    auto_save: False

env:
  group_name: "EnvGroup"
  # enable_offload: False
  train:
    total_num_envs: 64
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 200
    max_steps_per_rollout_epoch: 200
    group_size: 1
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    center_crop: False
    task_config:
      task_name: adjust_bottle
      step_lim: 200
      planner_backend: mplib
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0
  eval:
    total_num_envs: 64
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 200
    reward_coef: ${algorithm.reward_coef}
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/path/to/robotwin_assets"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval
    center_crop: False
    task_config:
      task_name: adjust_bottle
      step_lim: 200
      planner_backend: mplib
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
      domain_randomization:
        random_background: false
        cluttered_table: false
        clean_background_rate: 1
        random_head_camera_dis: 0
        random_table_height: 0
        random_light: false
        crazy_random_light_rate: 0

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

  expert_model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    precision: null
    model_path: "/path/to/model"
    num_action_chunks: 50
    add_value_head: False
    action_dim: 14
    openpi:
      config_name: "pi0_aloha_robotwin"
      num_images_in_input: 3
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 30000
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
