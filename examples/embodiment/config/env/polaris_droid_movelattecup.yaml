env_type: polaris

total_num_envs: null

auto_reset: False
ignore_terminations: False
use_rel_reward: False
seed: 0
group_size: 1

reward_coef: 1.0
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 450
max_episode_steps: 450

video_cfg:
  save_video: False
  info_on_video: True
  fps: 10
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "DROID-MoveLatteCup"
  num_envs: null
  episode_length_s: 30
  task_description: "put the latte art cup on top of the cutting board"
  usd_file: ${oc.decode:${oc.env:POLARIS_DATA_PATH}}/move_latte_cup/scene.usda
  dataset_path: ${oc.decode:${oc.env:POLARIS_DATA_PATH}}
  open_loop_horizon: ${oc.select:actor.model.num_action_chunks,rollout.model.num_action_chunks}
