env_type: genesis

seed: 0
total_num_envs: null
group_size: 1

auto_reset: True
ignore_terminations: False
use_fixed_reset_state_ids: False

max_steps_per_rollout_epoch: 200
max_episode_steps: 200

use_rel_reward: True
reward_coef: 1.0
is_eval: False

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  task_name: cube_pick
  robot_file: xml/franka_emika_panda/panda.xml
  dt: 0.01
  substeps: 4
  backend: cuda
  precision: "32"
  env_spacing:
    - 1.0
    - 1.0
  # Camera
  camera_height: 256
  camera_width: 256
  camera_pos:
    - 3.5
    - 0.0
    - 2.5
  camera_lookat:
    - 0.0
    - 0.0
    - 0.5
  camera_fov: 30
  contact_draw_debug: false
  # Task
  success_hold_steps: 3
  grasp_dist_threshold: 0.08
  # Reward 1: nonlinear approach reward
  approach_reward_scale: 1.0
  approach_reward_sharpness: 6.0
  # Reward 2: huge bonus once gripper grasps cube stably
  grasp_success_reward: 100.0
  cube_x_range:
    - 0.45
    - 0.65
  cube_y_range:
    - -0.25
    - 0.25
  eef_link_name: hand
