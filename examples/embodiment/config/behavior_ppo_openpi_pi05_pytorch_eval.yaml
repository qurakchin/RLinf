defaults:
  - env/behavior_r1pro@env.train
  - env/behavior_r1pro@env.eval
  - model/pi0_5_pytorch@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout,env,actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_ppo_openpi05_pytorch_eval"
    logger_backends: ["tensorboard"]

  only_eval: True

  max_epochs: 1000
  max_steps: 1

  val_check_interval: -1
  save_interval: 40
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 2
  eval_rollout_epoch: 8

  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
      fps: 15
  eval:
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
      fps: 15

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    # NEW-format checkpoint produced by ckpt_convertor.openpi (old2new / sft2new).
    # Set this to your local new-format eval checkpoint directory.
    model_path: /path/to/pi05_sft_pytorch_new
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 64
  seed: 1234
  enable_offload: True

  model:
    model_path: ${rollout.model.model_path}
    add_value_head: False
    num_images_in_input: 3
    proprio_dim: 32
    action_dim: 23
    num_action_chunks: 32
    openpi:
      action_env_dim: ${actor.model.action_dim}
      # Canonical BEHAVIOR task-0000 norm stats — the SAME assets the SFT path
      # resolves, so eval and SFT share one norm-stats distribution. Norm stats
      # live at {assets_dir}/{asset_id}/norm_stats.json.
      assets_dir: /path/to/pi05_sft_pytorch_new
      asset_id: physical-intelligence/behavior
      # PaliGemma SentencePiece tokenizer model (resolved from YAML, not hardcoded
      # in code).
      paligemma_tokenizer: /path/to/paligemma_tokenizer/paligemma_tokenizer.model

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
