defaults:
  - env/genesis_cubepick@env.train
  - env/genesis_cubepick@env.eval
  - model/mlp_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "genesis_cubepick_ppo_mlp"
    logger_backends: ["tensorboard"]

  # max_epochs: 100
  max_epochs: 200
  max_steps: -1

  only_eval: False
  val_check_interval: 50
  save_interval: -1

  seq_length: 1
  max_prompt_length: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: action_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0

  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: EnvGroup

  train:
    # total_num_envs: 128
    total_num_envs: 128
    group_size: ${algorithm.group_size}
    # max_steps_per_rollout_epoch: 200
    max_episode_steps: 50 # max episode steps for truncation
    max_steps_per_rollout_epoch: 50
    # max_episode_steps: 200

    use_rel_reward: True
    reward_coef: ${algorithm.reward_coef}
    is_eval: False
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    # total_num_envs: 16
    total_num_envs: 32
    group_size: ${algorithm.group_size}

    use_rel_reward: True
    reward_coef: ${algorithm.reward_coef}
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: ""
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: True

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 128    #51200 整除
  global_batch_size: 256
  seed: 1234
  enable_offload: False

  model:
    model_type: mlp_policy
    model_path: ""
    policy_setup: panda-qpos
    # Genesis CubePick: eef_pos(3) + eef_quat(4) + gripper(2) + cube_pos(3) + cube_quat(4) = 16
    obs_dim: 16
    # Franka: 7 motor DOFs + 2 finger DOFs = 9
    action_dim: 9
    num_action_chunks: 1
    hidden_dim: 256
    precision: "32"
    add_value_head: True
    is_lora: False
    lora_rank: 32

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: False
    cpu_offload: False
    offload_pin_memory: False
    reshard_after_forward: True
    enable_gradient_accumulation: True
    forward_prefetch: False
    limit_all_gathers: False
    backward_prefetch: null
    use_orig_params: False
    use_liger_kernel: False
    fsdp_size: -1

    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

    amp:
      enabled: False
      precision: bf16
      use_grad_scaler: False

reward:
  use_reward_model: False

critic:
  use_critic_model: False