model_type: "steam_value_model"

# Backbone load dtype = FSDP master parameter dtype. Keep this fp32 even
# when ``fsdp_config.mixed_precision.param_dtype: bf16`` is set — that
# combination is the standard "fp32 master, bf16 forward" recipe. Loading
# in bf16 makes the master copy bf16 too, which collapses Adam's second
# moment after a couple of steps and produces non-finite hidden_states.
precision: fp32
is_lora: false

# Backbones (local paths or HF repo ids). SteamProcessor uses
# tokenizer_path; the backbone loads vision/language encoders via
# vision_repo_id / language_repo_id.
vision_repo_id: /path/to/siglip-so400m-patch14-384
language_repo_id: /path/to/gemma-3-270m
tokenizer_path: /path/to/gemma-3-270m

# Architecture
fusion_hidden_dim: 512
dropout: 0.1

# Binary classification head
label_smoothing: 0.05
num_frames_per_pair: 2   # (frame_t, frame_{t+k}) — keep at 2 for the standard recipe
stride_k: null            # filled from data.k by the STEAM SFT worker
ensemble_size: 1
ensemble_head_seed_base: null

# Runtime
freeze_vision_encoder: false
freeze_language_model: false
use_gradient_checkpointing: false

# Prompt tokenization length.
max_token_len: 200

# Optional: previously trained SteamCriticModel checkpoint to resume.
# model_path: "/path/to/checkpoint"
