# Usage: bash examples/offline_rl/advantage_labeling/steam/run_steam_sft.sh steam_value_model_sft

defaults:
  - model/steam_value_model@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/offline_rl/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "steam_sft"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 16000
  val_check_interval: -1
  save_interval: 1000

data:
  train_data_paths:
    - dataset_path: "/path/to/sft_dataset"
      type: sft
    - dataset_path: "/path/to/rollout_dataset"
      type: rollout

  balance_weights: true
  seed: 42
  dataset_type: sft

  camera_keys:
    - observation.images.global
    - observation.images.right
    - observation.images.wrist

  k: 32
  # false = train on all episodes (success + failure); true = keep only
  # successful episodes (rollout datasets only; sft is always all-success).
  only_success: false
  min_episode_length: null

  train_num_workers: 8
  eval_num_workers: 4
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false
  do_augment: false

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 512
  seed: 0

  model:
    precision: bf16
    fusion_hidden_dim: 512
    dropout: 0.1
    label_smoothing: 0.05
    num_frames_per_pair: 2
    num_bins: 32
    vision_repo_id: "/path/to/siglip"
    language_repo_id: "/path/to/gemma3"
    tokenizer_path: "/path/to/gemma/tokenizer"
    freeze_vision_encoder: false
    freeze_language_model: false
    include_state_in_prompt: false
    max_state_dim: 32
    state_discretization_bins: 256
    max_token_len: 200
    ensemble_size: 1
    ensemble_head_seed_base: 0
    use_gradient_checkpointing: true

  optim:
    lr: 5.0e-5
    value_lr: 5.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1.0e-5
    clip_grad: 10.0
    lr_scheduler: "constant"
    lr_warmup_steps: 500
    total_training_steps: 16000
    min_lr: 1.0e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: true
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: fp32
      buffer_dtype: fp32

reward:
  use_reward_model: False

critic:
  use_critic_model: False
