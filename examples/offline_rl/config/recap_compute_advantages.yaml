# Usage:
#   bash examples/offline_rl/advantage_labeling/recap/process/run_compute_advantages.sh recap_compute_advantages
#   bash examples/offline_rl/advantage_labeling/recap/process/run_compute_advantages.sh recap_compute_advantages --nproc 4 \
#       advantage.value_checkpoint=/path/to/checkpoint

defaults:
  - model/recap_value_model@advantage.model

advantage:
  value_checkpoint: /path/to/value_checkpoint
  batch_size: 1024
  flush_interval: 256
  num_dataloader_workers_per_gpu: 12
  prefetch_factor: 2
  discount_next_value: true
  positive_quantile: 0.3
  tag: null
  returns_tag: null

  model:
    critic_expert_variant: "gemma_1m"
    tokenizer_path: /path/to/gemma-3-270m
    siglip_path: /path/to/siglip2-so400m-patch14-224
    gemma3_path: /path/to/gemma-3-270m

data:
  # openpi variant the value model was trained with ("pi0" / "pi05"). Must
  # match recap_value_model_sft.yaml's data.model_type — it selects the input
  # transforms and quantile normalization used to score frames.
  model_type: "pi05"

  train_data_paths:
    - dataset_path: "/path/to/sft_dataset"
      robot_type: "libero"
      type: "sft"
      weight: 1.0

  advantage_lookahead_step: 10
  gamma: 1.0

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/offline_rl/config/
  job:
    chdir: false
