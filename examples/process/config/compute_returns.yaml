# Compute returns configuration for LeRobot datasets
#
# Usage:
#   python compute_returns.py --config-name compute_returns
#
# This script:
# 1. Writes `return`, `reward`, and `prompt` to meta/returns_{tag}.parquet sidecar
# 2. Updates meta/stats.json with return/reward statistics
# 3. Updates meta/info.json with new feature definitions

# =============================================================================
# Data configuration
# =============================================================================
data:
  # Root directory for datasets (optional)
  # If specified, relative paths in train_data_paths list will be resolved against this
  data_root: null

  # List of datasets to process
  # Each entry can have:
  #   - dataset_path: Path to LeRobot dataset (REQUIRED)
  #   - output_path: Output path (optional, null = modify in-place)
  #   - type: "sft" or "rollout" (default: use global dataset_type)
  #   - gamma: Discount factor (default: use global gamma)
  #   - failure_reward: Failure penalty (default: use global failure_reward)
  #
  # Example configuration:
  #   train_data_paths:
  #     - dataset_path: /path/to/sft_dataset
  #       type: sft
  #     - dataset_path: /path/to/rollout_dataset
  #       type: rollout
  #       failure_reward: -300.0
  train_data_paths:
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/libero_10_3shot
      type: sft
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/collected_data_3shot_8192_task0_merged
      type: rollout
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300_2iter/collected_data_3shot_8192_task0_iter_2_merged
      type: rollout
    - dataset_path: /mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/collected_data_3shot_512_task0_merged_for_eval
      type: rollout

  # --------------------------------------------------------------------------
  # Global defaults (used when not specified per-dataset)
  # --------------------------------------------------------------------------

  # Dataset type: "sft" or "rollout"
  # - sft: All episodes are successful (reward=-1 per step, last step=0)
  # - rollout: Read is_success from sample data (failure gets failure_reward)
  dataset_type: "sft"

  # Discount factor
  # Use 1.0 for undiscounted returns (common in robotics)
  gamma: 1.0

  # Failure reward for rollout datasets. Default if failure_reward is not specified in train_data_paths
  # Last step of failed episodes gets this reward
  failure_reward: -300.0

  # Returns tag: when set, saves to meta/returns_{tag}.parquet
  # Allows computing returns with different configs on the same data
  # Usage: data.tag=my_experiment
  tag: null

  # Number of parallel workers for parquet file processing
  num_workers: 128

# =============================================================================
# Hydra configuration
# =============================================================================
hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
