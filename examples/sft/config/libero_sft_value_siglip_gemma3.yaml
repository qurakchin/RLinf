# SigLIP-Gemma3 value model training config
#
# Architecture: SigLIP2-so400m (1152-dim) + Gemma3-270M (640-dim) + Gemma expert
# Forward mode: two-stage only (no interleaved)
#
# Usage:
#   bash run_value_sft.sh libero_sft_value_siglip_gemma3

defaults:
  - model/value_siglip_gemma3@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "value_sft_siglip_gemma3"
    logger_backends: ["tensorboard"]

  max_epochs: 30000
  max_steps: -1
  val_check_interval: 500
  save_interval: 3000

# =====================================================================
# Data Configuration
# =====================================================================
data:
  train_data_paths:
    - dataset_path: "/mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/libero_10_3shot"
      type: "sft"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"

    - dataset_path: "/mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/collected_data_3shot_8192_task0_merged"
      type: "rollout"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"

  eval_data_paths:
    - dataset_path: "/mnt/project_rlinf_hs/liuzhihao/data_to_use/libero_10_3shot_collect_8192_task0_fail300/collected_data_3shot_512_task0_merged_for_eval"
      max_samples: 20000
      robot_type: "libero"
      model_type: "pi05"

  # ----- dataloader performance -----
  train_num_workers: 8
  eval_num_workers: 4
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false
  # ----- shared dataset params -----
  value_prefix: "Value: "
  include_state: true
  gamma: 1.0
  action_horizon: 10
  num_return_bins: 201
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 7
  robot_type: "libero"
  model_type: "pi05"

  # ----- mixture settings -----
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 0

  model:
    precision: bf16
    siglip_path: "/mnt/project_rlinf/liuzhihao/RLinf_pi06_release_final_clean/pretrained_models/siglip2-so400m-patch14-224"
    gemma3_path: "/mnt/project_rlinf/liuzhihao/RLinf_pi06_release_final_clean/pretrained_models/gemma-3-270m"
    tokenizer_path: "/mnt/project_rlinf/liuzhihao/RLinf_pi06_release_final_clean/pretrained_models/gemma-3-270m"
    freeze_vlm: false
    # Override action params for libero
    action_dim: 7
    action_horizon: 10

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 500
    total_training_steps: 8000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
