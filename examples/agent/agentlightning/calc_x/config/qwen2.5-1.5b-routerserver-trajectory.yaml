defaults:
  - base_calc_x

runner:
  logger:
    project_name: rlinf-calc-x-qwen2.5-1.5b-routerserver-trajectory
  experiment_name: calc-x-agl-qwen2.5-1.5b-routerserver-trajectory
  seq_length: 8192

algorithm:
  advantage_mode: trajectory
  loss_scales: ["group_level"] # used for multi-turn loss scaling

actor:
  pack_traj: True

rollout:
  sglang:
    serving_mode: router_server
    router:
      host: 0.0.0.0
      port: 30000
      policy: round_robin
