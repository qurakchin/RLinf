defaults:
  - base_eval

cluster:
  num_nodes: 1
  component_placement:
    actor,rollout,reward: all

runner:
  experiment_name: qa_offline_2eng
  output_dir: ./logs/eval
  seq_length: 32000  

  max_epochs: 1
  max_steps: -1  

algorithm:
  group_size: 4

agentloop:
  workflow: mas # or sa, mas refers to multi-agent, sa refers to single-agent
  llm_ip: ${oc.env:LLM_JUDGE_IP}
  llm_port: 30000
  fixed_role: worker # planner or worker

rollout:
  model:
    model_path: /PATH/TO/MODEL # TODO:
  use_fixed_worker: True

rollout_fixed_worker:
  model:
    model_path: /PATH/TO/MODEL # TODO:

tools:
  online: False

data:
  type: wideseek_r1
  max_prompt_length: 4096
  val_rollout_batch_size: 1000
  prompt_key: question
  answer_key: answer
  is_markdown: False
  val_data_paths: /PATH/TO/EVAL/QA/DATASET # TODO:
  validation_shuffle: True
  data_size: -1
