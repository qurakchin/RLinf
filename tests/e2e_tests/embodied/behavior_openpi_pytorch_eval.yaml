defaults:
  - env/behavior_r1pro@env.train
  - env/behavior_r1pro@env.eval
  - model/pi0_5_pytorch@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    rollout,env,actor: 0-1

runner:
  task_type: embodied
  logger:
    log_path: "../results/behavior_openpi_pytorch_eval"
    project_name: rlinf
    experiment_name: "test_openpi_pytorch_eval"
    logger_backends: ["tensorboard"]

  only_eval: True

  max_epochs: 1
  max_steps: 1

  val_check_interval: -1
  save_interval: -1
  seq_length: 4096
  max_prompt_length: 50

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 2
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    video_cfg:
      save_video: False
  eval:
    total_num_envs: 2
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    video_cfg:
      save_video: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    # Minimal CI fixture (see the ci_behavior README): the new-format eval
    # checkpoint staged under /workspace.
    model_path: /workspace/ci_behavior/model
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 1234
  enable_offload: True

  model:
    model_path: ${rollout.model.model_path}
    add_value_head: False
    num_images_in_input: 3
    proprio_dim: 32
    action_dim: 23
    num_action_chunks: 32
    openpi:
      action_env_dim: ${actor.model.action_dim}
      assets_dir: /workspace/ci_behavior/model
      asset_id: physical-intelligence/behavior
      paligemma_tokenizer: /workspace/ci_behavior/paligemma_tokenizer/paligemma_tokenizer.model

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    clip_grad: 10.0
    weight_decay: 0.01
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
