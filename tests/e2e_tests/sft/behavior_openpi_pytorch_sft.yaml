defaults:
  - model/pi0_5_pytorch@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "test_openpi_pytorch_sft"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 2
  val_check_interval: -1
  save_interval: 10

data:
  # Minimal CI fixture (see the ci_behavior README): the task-0000 subset staged
  # under /workspace.
  train_data_paths: /workspace/ci_behavior/dataset
  behavior_dataset_root: ${data.train_data_paths}
  repo_id: "behavior-1k/2025-challenge-demos"
  modalities: ["rgb"]
  num_workers: 1
  fine_grained_level: 0
  tolerance_s: 1.0e-4
  tasks: ["turning_on_radio"]
  use_skill: false
  task_subtasks:
    turning_on_radio:
      - "move to radio"
      - "pick up radio from coffee table"
      - "press radio"
      - "place radio on coffee table"

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  eval_batch_size: 1
  global_batch_size: 2
  seed: 42

  model:
    model_path: /workspace/ci_behavior/base_model
    openpi:
      assets_dir: /workspace/ci_behavior/assets
      asset_id: "behavior-1k/2025-challenge-demos"
      paligemma_tokenizer: /workspace/ci_behavior/paligemma_tokenizer/paligemma_tokenizer.model

  optim:
    lr: 2.5e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 2
    lr_warmup_steps: 1
    lr_scheduler: "openpi_cosine"
    num_cycles: 0.5
    min_lr: 0.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: True
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: fp32
      buffer_dtype: fp32

reward:
  use_reward_model: False

critic:
  use_critic_model: False
