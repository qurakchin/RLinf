defaults:
  - env/robotwin_place_empty_cup@env.eval
  - model/openvla_oft@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: 0-1

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results/robotwin_place_empty_cup_openvlaoft_eval"
    project_name: rlinf
    experiment_name: "test_robotwin_place_empty_cup_openvlaoft_eval"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"

  eval:
    rollout_epoch: 1
    total_num_envs: 8
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 25
    max_steps_per_rollout_epoch: 25
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: "/workspace/dataset/RoboTwin"
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: -1
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  pipeline_stage_num: 1

  model:
    model_path: "/workspace/dataset/RLinf-OpenVLAOFT-RoboTwin-SFT-place_empty_cup"
    model_type: "openvla_oft"
    implement_version: "official"
    value_type: action_level
    action_dim: 14
    use_proprio: True
    proprio_dim: 14
    use_film: False

    num_action_chunks: 25
    unnorm_key: place_empty_cup_1k
    center_crop: True

    add_value_head: True
    is_lora: True
    max_prompt_length: 512
