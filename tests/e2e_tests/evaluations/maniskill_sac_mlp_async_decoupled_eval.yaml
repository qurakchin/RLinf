defaults:
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0
    rollout: 0:0-1
    env: 0:0-1, 1:2-4

runner:
  task_type: embodied_eval
  # When decoupled mode is enabled, the communication mechanism between the env
  # worker and the rollout worker changes. The rollout and env workers are fully
  # decoupled, removing the static mapping.
  enable_decoupled_mode: True
  logger:
    log_path: /workspace/results/maniskill_sac_mlp_async_decoupled_eval
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 5
  max_steps: -1

  only_eval: True
  val_check_interval: 1
  save_interval: -1

env:
  group_name: "EnvGroup"
  
  eval:
    rollout_epoch: 1
    total_num_envs: 80
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  enable_torch_compile: True
  enable_cuda_graph: False
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    model_type: "mlp_policy"
    policy_setup: "panda-ee-dpos"
    action_dim: 4
    
    precision: "32"
    add_value_head: False
    add_q_head: True
